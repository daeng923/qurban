<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Panitia Tambahan Idul Adha 1447 H / 2026 M</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02); }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .transition-all { transition: all 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-800 line-clamp-1">Rekap Panitia Tambahan Idul Adha 1447 H</h1>
                    <p class="text-xs text-slate-500 font-medium uppercase tracking-wider" id="lastUpdated">Sinkronisasi Otomatis Spreadsheet</p>
                </div>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <div class="relative flex-1 md:w-64">
                    <input type="text" id="searchInput" placeholder="Cari personel/unit..." 
                        class="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none text-sm shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 absolute left-3 top-3 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                
                <!-- Toggle Button Fitur Sembunyikan Anggota -->
                <button id="toggleDetailsBtn" onclick="toggleDetails()" class="flex items-center gap-2 px-3 py-2 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors text-sm font-medium text-slate-600 shadow-sm" title="Tampilkan/Sembunyikan Anggota">
                    <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                    <span class="hidden sm:inline" id="toggleText">Ringkas</span>
                </button>

                <button onclick="fetchData()" class="p-2 bg-slate-100 rounded-lg hover:bg-slate-200 transition-colors shadow-sm" title="Refresh Data">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <!-- Summary Stats -->
        <div id="statsContainer" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-4 rounded-xl card-shadow border border-slate-100">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Total Staf</p>
                <h3 id="statTotal" class="text-2xl font-bold text-slate-800 tracking-tight">-</h3>
            </div>
            <div class="bg-white p-4 rounded-xl card-shadow border border-slate-100">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Unit Kerja</p>
                <h3 id="statUnits" class="text-2xl font-bold text-slate-800 tracking-tight">-</h3>
            </div>
            <div class="bg-white p-4 rounded-xl card-shadow border border-slate-100">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Koordinator</p>
                <h3 id="statKoords" class="text-2xl font-bold text-slate-800 tracking-tight">-</h3>
            </div>
            <div class="bg-white p-4 rounded-xl card-shadow border border-slate-100">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Status</p>
                <h3 id="syncStatus" class="text-2xl font-bold text-green-600 tracking-tight italic">LIVE</h3>
            </div>
        </div>

        <!-- Dashboard Grid -->
        <div id="loadingState" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="skeleton h-64 rounded-2xl"></div>
            <div class="skeleton h-64 rounded-2xl"></div>
            <div class="skeleton h-64 rounded-2xl"></div>
        </div>

        <div id="cardGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden"></div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p class="text-lg font-medium">Data tidak ditemukan</p>
        </div>
    </main>

    <script>
        /** * URL WEB APP GOOGLE APPS SCRIPT ANDA */
        const DATA_SOURCE_URL = "https://script.google.com/macros/s/AKfycbxhTfqUzRl795YaSfCpXCfJ8y3zJiyotz7g1hrFH5gSnOlH8q1VeOj2BnDjJAss0bilIg/exec"; 
        
        let masterData = [];
        let showDetailsState = true; // Status awal: tampilkan detail

        async function fetchData() {
            if (!DATA_SOURCE_URL) {
                console.warn("URL Sumber Data belum diisi. Menggunakan data demo.");
                processAndRender(getDemoData());
                return;
            }

            showLoading(true);
            try {
                const response = await fetch(DATA_SOURCE_URL);
                masterData = await response.json();
                processAndRender(masterData);
            } catch (error) {
                console.error("Gagal sinkronisasi data:", error);
                document.getElementById('syncStatus').textContent = "OFFLINE";
                document.getElementById('syncStatus').className = "text-2xl font-bold text-rose-500 italic";
                processAndRender(getDemoData());
            }
        }

        function toggleDetails() {
            showDetailsState = !showDetailsState;
            
            // Update UI Tombol
            const text = document.getElementById('toggleText');
            const icon = document.getElementById('eyeIcon');
            
            if (showDetailsState) {
                text.textContent = "Ringkas";
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
            } else {
                text.textContent = "Detail";
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />`;
            }

            renderCards(groupData(masterData));
        }

        function processAndRender(data) {
            updateStats(data);
            const grouped = groupData(data);
            renderCards(grouped);
            showLoading(false);
            document.getElementById('lastUpdated').textContent = "Sinkronisasi: " + new Date().toLocaleTimeString();
        }

        function groupData(data) {
            const groups = {};
            data.forEach(item => {
                const key = item.Koord || "Tanpa Nama";
                if (!groups[key]) {
                    groups[key] = { name: key, sie: item.Sie || "-", members: [] };
                }
                groups[key].members.push(item);
            });
            return Object.values(groups);
        }

        function renderCards(groups) {
            const grid = document.getElementById('cardGrid');
            const empty = document.getElementById('emptyState');
            
            if (groups.length === 0) {
                grid.classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }

            grid.classList.remove('hidden');
            empty.classList.add('hidden');

            grid.innerHTML = groups.map(group => `
                <div class="bg-white rounded-2xl border border-slate-100 card-shadow overflow-hidden flex flex-col transition-all">
                    <div class="p-5 ${showDetailsState ? 'border-b border-slate-50' : ''} bg-slate-50/50">
                        <div class="flex justify-between items-start mb-2">
                            <span class="px-2 py-0.5 bg-indigo-100 text-indigo-700 text-[10px] font-bold uppercase rounded tracking-wider">
                                ${group.sie}
                            </span>
                            <span class="text-[10px] text-slate-400 font-bold">${group.members.length} PERSONEL</span>
                        </div>
                        <h2 class="text-lg font-bold text-slate-800 leading-tight">${group.name}</h2>
                        <p class="text-xs text-slate-500 mt-1 uppercase tracking-tighter font-semibold">Koordinator Utama</p>
                    </div>
                    
                    <!-- Detail Section yang bisa disembunyikan -->
                    <div class="p-5 flex-1 space-y-4 ${showDetailsState ? '' : 'hidden'} transition-all">
                        ${Object.entries(groupByUnit(group.members)).map(([unit, persons]) => `
                            <div>
                                <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 border-b border-slate-50 pb-1">${unit}</h4>
                                <ul class="space-y-2">
                                    ${persons.map(p => `
                                        <li class="flex items-center gap-2 text-sm text-slate-700 font-medium">
                                            <div class="w-1.5 h-1.5 rounded-full bg-indigo-400"></div>
                                            <span>${p.Nama}</span>
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function groupByUnit(members) {
            return members.reduce((acc, curr) => {
                const unit = curr.Unit || "Lainnya";
                if (!acc[unit]) acc[unit] = [];
                acc[unit].push(curr);
                return acc;
            }, {});
        }

        function updateStats(data) {
            document.getElementById('statTotal').textContent = data.length;
            document.getElementById('statUnits').textContent = new Set(data.map(i => i.Unit)).size;
            document.getElementById('statKoords').textContent = new Set(data.map(i => i.Koord)).size;
        }

        function showLoading(isLoading) {
            const loader = document.getElementById('loadingState');
            const grid = document.getElementById('cardGrid');
            loader.classList.toggle('hidden', !isLoading);
            grid.classList.toggle('hidden', isLoading);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = masterData.filter(item => 
                (item.Nama || "").toLowerCase().includes(term) || 
                (item.Unit || "").toLowerCase().includes(term) ||
                (item.Koord || "").toLowerCase().includes(term)
            );
            renderCards(groupData(filtered));
        });

        function getDemoData() {
            return [
                { Nama: "Contoh Nama", Unit: "Instruksi", Sie: "System", Koord: "Admin" }
            ];
        }

        window.onload = fetchData;
    </script>
</body>
</html>
